<!DOCTYPE html>
<html>
<head>
<title>SAP Fiori O2C</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f5f7fa}
.container{width:85%;margin:auto}
input,button{padding:10px;margin:5px;width:100%}
button{background:#0a6ed1;color:white;border:none;cursor:pointer}
table{width:100%;margin-top:20px;border-collapse:collapse;background:white}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
.actions button{width:auto;margin:2px}
h2{color:#0a6ed1}
canvas{margin-top:20px;background:white;padding:10px}
</style>
</head>

<body>

<div class="container">
<h2>SAP Fiori - O2C Dashboard</h2>

<h3>Create Order</h3>
<input id="cust" placeholder="Customer Name">
<input id="prod" placeholder="Product">
<button onclick="createOrder()">Create Order</button>

<h3>Order History</h3>
<table>
<tr>
<th>ID</th>
<th>User</th>
<th>Customer</th>
<th>Product</th>
<th>Status</th>
<th>Actions</th>
</tr>
<tbody id="data"></tbody>
</table>

<canvas id="chart"></canvas>

</div>

<script>

let currentUser="Admin";

function createOrder(){
let id="ORD"+Math.floor(Math.random()*10000);
let cust=document.getElementById("cust").value;
let prod=document.getElementById("prod").value;

fetch('/add',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id:id,user:currentUser,customer:cust,product:prod,status:"Created"})
}).then(()=>loadData());
}

function updateStatus(id,status){
fetch('/update',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id:id,status:status})
}).then(()=>loadData());
}

function loadData(){
fetch('/get')
.then(res=>res.json())
.then(data=>{
let rows="";
data.forEach(o=>{
rows+=`<tr>
<td>${o[0]}</td>
<td>${o[1]}</td>
<td>${o[2]}</td>
<td>${o[3]}</td>
<td>${o[4]}</td>
<td class="actions">
<button onclick="updateStatus('${o[0]}','Delivered')">Delivery</button>
<button onclick="updateStatus('${o[0]}','Billed')">Billing</button>
<button onclick="updateStatus('${o[0]}','Completed')">Payment</button>
<button onclick="pdf('${o[0]}','${o[2]}','${o[3]}')">Invoice</button>
</td>
</tr>`;
});
document.getElementById("data").innerHTML=rows;
updateChart(data);
});
}

function pdf(id,cust,prod){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text("Invoice",20,20);
doc.text("Order ID: "+id,20,40);
doc.text("Customer: "+cust,20,50);
doc.text("Product: "+prod,20,60);
doc.save("invoice_"+id+".pdf");
}

function updateChart(data){
let complete=data.filter(o=>o[4]=="Completed").length;
let pending=data.length-complete;

new Chart(document.getElementById("chart"),{
type:'pie',
data:{
labels:["Completed","Pending"],
datasets:[{data:[complete,pending]}]
}
});
}

loadData();

</script>

</body>
</html>
